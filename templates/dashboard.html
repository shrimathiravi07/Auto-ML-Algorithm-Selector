<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container py-5">
        <h1 class="mb-4">{{ title }}</h1>

        <div class="row g-4">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Model Accuracy Comparison</h5>
                        <img src="{{ url_for('static', filename='images/' ~ chart_filename) }}"
                             alt="Model accuracy chart"
                             class="img-fluid mt-3">
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Recommended Model</h5>
                        <p class="display-6 text-success">{{ recommended_model }}</p>
                        <p class="text-muted">Accuracy: {{ recommended_accuracy }}%</p>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Comparison Table</h5>
                        <table class="table table-sm">
                            <thead>
                                <tr>
                                    <th>Algorithm</th>
                                    <th>Accuracy</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for row in comparison_rows %}
                                <tr>
                                    <td>{{ row.algorithm }}</td>
                                    <td>{{ row.accuracy }}%</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
